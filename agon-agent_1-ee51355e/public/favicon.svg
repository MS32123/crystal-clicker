<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" fill="#1e1b4b" rx="20"/>
  <g transform="translate(50,50) rotate(45)" filter="url(#glow)">
    <rect x="-25" y="-25" width="50" height="50" fill="url(#crystalGrad)" rx="8"/>
    <rect x="-18" y="-18" width="20" height="20" fill="rgba(255,255,255,0.3)" rx="4"/>
  </g>
</svg>
